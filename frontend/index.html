<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShiftWise — Smart Team Scheduling</title>
  <meta name="description" content="ShiftWise — Auto-generate fair, conflict-free shift schedules for your team." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/css/main.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
  <div id="toast-container" aria-live="polite"></div>
  <div id="app">
    <div class="splash-screen">
      <div class="splash-logo">
        <svg width="40" height="40" viewBox="0 0 48 48" fill="none">
          <rect width="48" height="48" rx="24" fill="rgba(45,110,31,0.15)" stroke="rgba(78,168,100,0.4)" stroke-width="1.5"/>
          <circle cx="24" cy="24" r="10" stroke="#4ea864" stroke-width="1.5" fill="none"/>
          <line x1="24" y1="24" x2="24" y2="16" stroke="#4ea864" stroke-width="2" stroke-linecap="round"/>
          <line x1="24" y1="24" x2="30" y2="27" stroke="#4ea864" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="24" cy="24" r="1.5" fill="#4ea864"/>
        </svg>
        <span style="font-family:'Playfair Display',serif;font-weight:600;color:#f0e4c8;letter-spacing:0.04em">ShiftWise</span>
      </div>
      <div class="splash-spinner"></div>
    </div>
  </div>
  <script type="module" src="/src/js/app.js"></script>
</body>
</html>
