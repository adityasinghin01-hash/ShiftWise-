<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spinx — Auth Platform</title>
  <meta name="description" content="Spinx — Secure SaaS authentication platform dashboard" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/css/main.css" />

  <!-- Google Identity Services (Sign In With Google) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- Google reCAPTCHA v2 -->
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
  <!-- Toast notifications -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- App root: router swaps this -->
  <div id="app">
    <div class="splash-screen">
      <div class="splash-logo">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect width="48" height="48" rx="12" fill="url(#grad)"/>
          <path d="M16 24L22 30L32 18" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="grad" x1="0" y1="0" x2="48" y2="48">
              <stop offset="0%" stop-color="#7c3aed"/>
              <stop offset="100%" stop-color="#06b6d4"/>
            </linearGradient>
          </defs>
        </svg>
        <span>Spinx</span>
      </div>
      <div class="splash-spinner"></div>
    </div>
  </div>

  <script type="module" src="/src/js/app.js"></script>
</body>
</html>
